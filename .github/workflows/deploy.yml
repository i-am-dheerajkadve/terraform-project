name: Deploy Infra with terraform

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:

    # 🔹 1. Checkout
    - name: Checkout code
      uses: actions/checkout@v3

    # 🔹 2. Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 🔹 3. Configure AWS
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 🔹 4. Terraform Init
    - name: Terraform Init
      run: terraform init

    # 🔹 5. Terraform Validate
    - name: Terraform Validate
      run: terraform validate

    # 🔹 6. Terraform Plan
    - name: Terraform Plan
      run: terraform plan

    # 🔹 7. Terraform Apply
    - name: Terraform Apply
      run: terraform apply -auto-approve
      

    # 🔹 8. Get EC2 IP
    - name: Get EC2 IP
      run: echo "EC2_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV

    # 🔹 9. Get RDS Endpoint
    - name: Get RDS Endpoint
      run: echo "RDS_ENDPOINT=$(terraform output -raw rds_endpoint)" >> $GITHUB_ENV

    # 🔹 10. Wait for EC2
    - name: Wait for EC2 boot
      run: sleep 60

    # 🔹 11. SSH into EC2 and Deploy
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3

      with:
        host: ${{ env.EC2_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}

        # 🔥 IMPORTANT FIX: pass variable properly
        envs: RDS_ENDPOINT

        script: |

          sudo apt update -y
          sudo apt install docker.io -y
          sudo systemctl start docker
          sudo systemctl enable docker

          # Install Docker Compose
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64" \
          -o /usr/local/bin/docker-compose

          sudo chmod +x /usr/local/bin/docker-compose

          mkdir -p ~/app
          cd ~/app

          # ---------------- .env file ----------------
          cat > .env <<EOF
          DB_HOST=${RDS_ENDPOINT}
          DB_PORT=5432
          DB_NAME=appdb
          DB_USER=postgres
          DB_PASSWORD=postgres123
          REACT_APP_API_URL=http://backend:8080
          EOF

          # ---------------- docker-compose ----------------
          cat > docker-compose.yml <<EOF
          version: '3.8'

          services:

            backend:
              image: harshjswl/k8s-backend
              container_name: backend
              ports:
                - "8080:8080"
              env_file:
                - .env
              restart: always

            frontend:
              image: harshjswl/k8s-frontend
              container_name: frontend
              ports:
                - "3000:80"
              depends_on:
                - backend
              restart: always

          EOF

          # ---------------- RUN ----------------
          sudo docker compose up -d
