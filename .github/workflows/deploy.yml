name: Deploy Infra with terraform

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      action:
        description: "apply or destroy"
        required: true
        default: "apply"

jobs:
  terraform:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      ACTION: ${{ github.event.inputs.action || 'apply' }}

    steps:
      # 🔹 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 🔹 2. Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🔹 3. Configure AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 🔹 4. Terraform Init
      - name: Terraform Init
        run: terraform init

      # 🔹 5. Terraform Validate
      - name: Terraform Validate
        run: terraform validate

      # 🔹 6. Terraform Plan
      - name: Terraform Plan
        if: env.ACTION == 'apply'
        run: terraform plan

      # 🔹 7. Terraform Apply
      - name: Terraform Apply
        if: env.ACTION == 'apply'
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: env.ACTION == 'destroy'
        run: terraform destroy -auto-approve

      # 🔹 8. Get EC2 IP
      - name: Get EC2 IP
        run: echo "EC2_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV

      # 🔹 9. Get RDS Endpoint
      - name: Get RDS Endpoint
        run: echo "RDS_ENDPOINT=$(terraform output -raw rds_endpoint)" >> $GITHUB_ENV

      # 🔹 10. Wait for EC2
      - name: Wait for EC2 boot
        run: sleep 60

      # 🔹 11. SSH into EC2 and Deploy
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: RDS_ENDPOINT

          script: |
            sudo apt update -y
            sudo apt install docker.io -y

            sudo systemctl start docker
            sudo systemctl enable docker

            # Install Docker Compose
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64" -o /usr/local/bin/docker-compose

            sudo chmod +x /usr/local/bin/docker-compose

            mkdir -p ~/app
            cd ~/app

            # ---------------- .env file ----------------
            cat > .env <<EOF
            POSTGRES_USER=postgres
            POSTGRES_PASSWORD=postgres123
            POSTGRES_DB=appdb
            SPRING_DATASOURCE_URL=jdbc:postgresql://${RDS_ENDPOINT}:5432/appdb
            SPRING_DATASOURCE_USERNAME=postgres
            SPRING_DATASOURCE_PASSWORD=postgres123
            VITE_API_URL=http://localhost:8080
            EOF

            # ---------------- docker-compose ----------------
            cat > docker-compose.yml <<EOF
            version: '3.8'

            services:

              backend:
                image: harshjswl/k8s-backend
                container_name: backend-service
                ports:
                  - "8080:8080"
                env_file:
                  - .env
                restart: always

              frontend:
                image: harshjswl/k8s-frontend
                container_name: frontend
                ports:
                  - "3000:80"
                depends_on:
                  - backend
                restart: always

            EOF

            # ---------------- RUN ----------------
            sudo docker-compose up -d

  destroy:
    needs: terraform
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
